{% extends 'base.html' %}

{% block content %}
<input type="hidden" id="current_hotel_id" value="{{ hotel_id }}">

<div id="hotel-info-section" style="max-width: 1200px; margin: 0 auto 40px auto; display: none;">
    <!-- Hotel Info populated by JS -->
</div>

<div class="modern-card" style="max-width: 1200px; margin: 0 auto 40px auto; padding: 20px;">
    <h2 style="color: var(--primary-green); border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 2rem;">Available Rooms</h2>
    <div id="rooms-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <!-- Rooms populated by JS -->
    </div>
</div>

<script src="/static/js/hotel_detail.js"></script>
{% endblock %}
