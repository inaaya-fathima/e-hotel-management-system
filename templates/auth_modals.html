<div class="modal-overlay" id="login-modal">
    <div class="auth-box">
        <div class="auth-doodle-side">
            <div class="auth-doodle-content">
                <i class="fa-solid fa-plane"></i>
            </div>
        </div>
        <div class="auth-form-side">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="login-username" class="form-control" placeholder="Username or Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <p style="text-align: center; margin-top: 15px;">
                    Don't have an account? <a href="#" onclick="switchModal('login-modal', 'signup-modal')">Sign up</a>
                </p>
            </form>
        </div>
    </div>
</div>

<div class="modal-overlay" id="signup-modal">
    <div class="auth-box">
        <div class="auth-doodle-side">
            <div class="auth-doodle-content">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
        </div>
        <div class="auth-form-side">
            <h2 class="auth-title">Create Account</h2>
            <form id="signupForm">
                <div class="form-group"><input type="text" id="reg-username" class="form-control" placeholder="Username" required></div>
                <div class="form-group"><input type="email" id="reg-email" class="form-control" placeholder="Email" required></div>
                <div class="form-group"><input type="text" id="reg-phone" class="form-control" placeholder="Phone Number" required></div>
                <div class="form-group"><input type="password" id="reg-password" class="form-control" placeholder="Password" required></div>
                <button type="submit" class="btn-primary">Sign Up</button>
                <p style="text-align: center; margin-top: 15px;">
                    Already have an account? <a href="#" onclick="switchModal('signup-modal', 'login-modal')">Login</a>
                </p>
            </form>
        </div>
    </div>
</div>

<div class="modal-overlay" id="otp-modal">
    <div class="auth-box">
        <div class="auth-doodle-side">
            <div class="auth-doodle-content">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </div>
        <div class="auth-form-side">
            <h2 class="auth-title">Verify OTP</h2>
            <p style="margin-bottom: 20px; text-align: center; color: var(--text-muted);">Please enter the 6-digit code.</p>
            <form id="otpForm">
                <input type="hidden" id="otp-username">
                <div class="form-group">
                    <input type="text" id="otp-code" class="form-control" placeholder="------" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;" required>
                </div>
                <button type="submit" class="btn-primary">Verify</button>
            </form>
        </div>
    </div>
</div>
