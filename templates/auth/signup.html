<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — E-Hotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo">
      <div style="font-size:3rem;color:var(--accent);margin-bottom:8px"><i class="fas fa-hotel"></i></div>
      <h1>E-Hotel</h1>
      <p>Create Your Account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}"><i class="fas fa-info-circle"></i> {{ msg }}</div>
    {% endfor %}{% endif %}{% endwith %}

    <form method="post" action="{{ url_for('customer_signup') }}">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Full Name</label>
        <input type="text" class="form-control" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" class="form-control" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" class="form-control" name="phone" placeholder="9876543210">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" class="form-control" name="password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('customer_login') }}">Login</a>
    </div>
    <div class="auth-footer mt-2">
      <a href="{{ url_for('index') }}" style="color:var(--text2)"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
