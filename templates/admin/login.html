<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — E-Hotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:3rem;color:var(--accent);margin-bottom:8px"><i class="fas fa-user-shield"></i></div>
      <h1>E-Hotel</h1>
      <p>Admin Control Panel</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}"><i class="fas fa-info-circle"></i> {{ msg }}</div>
    {% endfor %}{% endif %}{% endwith %}

    <div class="auth-title">Administrator Login</div>
    <div class="auth-subtitle">Default: admin / admin123</div>

    <form method="post" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Username</label>
        <input type="text" class="form-control" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" class="form-control" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">
        <i class="fas fa-sign-in-alt"></i> Login as Admin
      </button>
    </form>

    <div class="auth-footer mt-2">
      <a href="{{ url_for('staff_login') }}" style="color:var(--text2)"><i class="fas fa-id-badge"></i> Staff Login</a>
      &nbsp;|&nbsp;
      <a href="{{ url_for('customer_login') }}" style="color:var(--text2)"><i class="fas fa-user"></i> Customer Login</a>
    </div>
    <div class="auth-footer mt-2">
      <a href="{{ url_for('index') }}" style="color:var(--text2)"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
