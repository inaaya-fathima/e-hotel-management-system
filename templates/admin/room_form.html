{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if room else 'Add' }} Room — Admin{% endblock %}
{% block page_title %}{{ 'Edit' if room else 'Add New' }} Room{% endblock %}

{% block content %}
<div class="action-bar anim-fade-up">
  <div class="panel-header" style="margin:0">
    <h1>{{ 'Edit' if room else 'Add New' }} <span class="text-accent">Room</span></h1>
  </div>
  <a href="{{ url_for('admin_rooms') }}" class="btn btn-outline">
    <i class="fas fa-arrow-left"></i> Back to Rooms
  </a>
</div>

<div class="card anim-fade-up-delay-1" style="max-width:700px">
  <form method="post">
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Room Number *</label>
        <input type="text" class="form-control" name="room_number"
               value="{{ room['room_number'] if room else '' }}" placeholder="e.g. 101" required>
      </div>
      <div class="form-group">
        <label class="form-label">Room Type *</label>
        <select class="form-control" name="room_type" required>
          {% for t in ['Single','Double','Deluxe','Suite'] %}
          <option value="{{ t }}" {{ 'selected' if room and room['room_type']==t else '' }}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Price per Night (₹) *</label>
        <input type="number" class="form-control" name="price"
               value="{{ room['price'] if room else '' }}" placeholder="2000" min="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">Status *</label>
        <select class="form-control" name="status" required>
          {% for s in ['Available','Occupied','Maintenance'] %}
          <option value="{{ s }}" {{ 'selected' if room and room['status']==s else '' }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input type="url" class="form-control" name="image_url"
             value="{{ room['image_url'] if room else '' }}" placeholder="https://...">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" name="description" placeholder="Describe the room...">{{ room['description'] if room else '' }}</textarea>
    </div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> {{ 'Update Room' if room else 'Add Room' }}
      </button>
      <a href="{{ url_for('admin_rooms') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
